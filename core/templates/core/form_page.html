<!DOCTYPE html>
<html lang="en">
<head>
    <title>{{ title }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 flex items-center justify-center min-h-screen p-4">
    <div class="bg-white rounded-2xl shadow-2xl p-8 max-w-md w-full border border-slate-100">
        <h2 class="text-2xl font-black text-slate-900 tracking-tight mb-6 text-center uppercase">{{ title }}</h2>
        <form method="POST" class="space-y-5">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-xl shadow-md transition mt-4">Compile Workspace Vectors</button>
        </form>
        <div class="mt-6 text-center">
            <a href="{% url 'core:super_admin_dashboard' %}" class="text-sm font-semibold text-indigo-600 hover:text-indigo-500 transition">&larr; Return to Master Dashboard Console</a>
        </div>
    </div>
</body>
</html>
