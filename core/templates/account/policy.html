<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ policy.title }} - {{ settings.site_name|default:"AutoEmail SaaS" }}</title>
    <style>
        body { 
            margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #0b0c10; color: #cbd5e1; 
            background-image: radial-gradient(circle at 15% 50%, rgba(76, 29, 149, 0.2), transparent 25%), radial-gradient(circle at 85% 30%, rgba(29, 78, 216, 0.2), transparent 25%);
        }
        .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: url('https://www.transparenttextures.com/patterns/stardust.png'); animation: moveStars 100s linear infinite; }
        @keyframes moveStars { from { background-position: 0 0; } to { background-position: 1000px 500px; } }
        
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 20px 50px; background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .logo a { color: white; text-decoration: none; font-size: 24px; font-weight: bold; letter-spacing: 2px;}
        
        .content-container { max-width: 800px; margin: 60px auto; padding: 40px; background: rgba(30, 41, 59, 0.8); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; backdrop-filter: blur(10px); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        h1 { color: white; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 20px; margin-top: 0;}
        .policy-text { line-height: 1.8; font-size: 1.05rem; white-space: pre-wrap; }
        
        .footer { text-align: center; padding: 50px; margin-top: 50px; border-top: 1px solid rgba(255,255,255,0.1); }
        .footer a { color: #94a3b8; text-decoration: none; margin: 0 15px; }
    </style>
</head>
<body>
    <div class="stars"></div>

    <nav class="navbar">
        <div class="logo">
            <a href="/">{{ settings.site_name|default:"AutoEmail SaaS" }}</a>
        </div>
        <div>
            <a href="/" style="color: #60a5fa; text-decoration: none; font-weight: bold;">&larr; Back to Home</a>
        </div>
    </nav>

    <div class="content-container">
        <h1>{{ policy.title }}</h1>
        
        <!-- The text you type in the Super Admin will appear right here -->
        <div class="policy-text">{{ policy.content|safe }}</div>
    </div>

    <div class="footer">
        <a href="/policy/privacy-policy">Privacy Policy</a>
        <a href="/policy/terms">Terms of Service</a>
    </div>
</body>
</html>
