<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Console Login</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0b0c10; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; background-image: radial-gradient(circle at 15% 50%, rgba(76, 29, 149, 0.2), transparent 25%), radial-gradient(circle at 85% 30%, rgba(29, 78, 216, 0.2), transparent 25%); }
        .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: url('https://www.transparenttextures.com/patterns/stardust.png'); animation: moveStars 100s linear infinite; }
        @keyframes moveStars { from { background-position: 0 0; } to { background-position: 1000px 500px; } }
        
        .login-box { background: rgba(30, 41, 59, 0.8); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 40px; width: 100%; max-width: 400px; text-align: center; backdrop-filter: blur(10px); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        h2 { margin-top: 0; color: #cbd5e1; text-transform: uppercase; letter-spacing: 2px; font-size: 1.2rem; margin-bottom: 30px;}
        
        input { width: 100%; padding: 12px; margin-bottom: 20px; background: rgba(15, 23, 42, 0.6); border: 1px solid #334155; color: white; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        input:focus { outline: none; border-color: #6366f1; }
        
        button { width: 100%; background-color: #4f46e5; color: white; padding: 12px; border: none; border-radius: 8px; font-weight: bold; font-size: 1rem; cursor: pointer; transition: background 0.3s; }
        button:hover { background-color: #4338ca; }
        
        .messages { color: #ef4444; margin-bottom: 20px; font-size: 0.9rem; font-weight: bold; }
    </style>
</head>
<body>
    <div class="stars"></div>

    <div class="login-box">
        <h2>System Administrator</h2>
        
        {% if messages %}
        <div class="messages">
            {% for message in messages %}
                {{ message }}
            {% endfor %}
        </div>
        {% endif %}

        <form method="POST" action="{% url 'custom_admin_login' %}">
            {% csrf_token %}
            <input type="text" name="username" placeholder="Admin Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Authenticate</button>
        </form>
    </div>
</body>
</html>
