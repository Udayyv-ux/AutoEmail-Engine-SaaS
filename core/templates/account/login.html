{% load socialaccount %}
<!DOCTYPE html>
<html lang="en">
<head>
    <title>Sign In | Workspace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        function toggleAdmin() {
            const adminForm = document.getElementById('admin-login-form');
            const googleSection = document.getElementById('google-section');
            const btnText = document.getElementById('toggle-btn');
            
            if (adminForm.classList.contains('hidden')) {
                adminForm.classList.remove('hidden');
                googleSection.classList.add('hidden');
                btnText.innerText = "Back to Google Login";
            } else {
                adminForm.classList.add('hidden');
                googleSection.classList.remove('hidden');
                btnText.innerText = "Administrator Login";
            }
        }
    </script>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen p-4 font-sans">
    
    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl border border-slate-200 p-10 text-center relative">
        
        <!-- Error Messages -->
        {% if messages %}
        <div class="absolute top-4 left-0 w-full px-10">
            {% for message in messages %}
            <div class="bg-rose-50 text-rose-600 text-sm py-2 px-4 rounded-lg border border-rose-200 font-bold mb-4 shadow-sm">
                {{ message }}
            </div>
            {% endfor %}
        </div>
        {% endif %}

        <div class="mb-8 mt-4">
            <div class="w-16 h-16 bg-blue-600 text-white rounded-2xl flex items-center justify-center font-black text-4xl mx-auto mb-6 shadow-inner">W</div>
            <h1 class="text-2xl font-black text-slate-900">Sign In</h1>
        </div>

        <!-- Google Section (NOW A SECURE POST FORM FOR 1-CLICK LOGIN) -->
        <div id="google-section">
            <form action="{% provider_login_url 'google' %}" method="POST" class="w-full">
                {% csrf_token %}
                <button type="submit" class="w-full flex items-center justify-center gap-3 bg-white border border-slate-200 text-slate-700 hover:bg-slate-50 font-bold py-4 rounded-xl transition shadow-sm text-lg">
                    <svg class="w-5 h-5" viewBox="0 0 24 24">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                    </svg>
                    Continue with Google
                </button>
            </form>
        </div>

        <!-- Admin Form (Points to our custom view) -->
        <form id="admin-login-form" method="POST" action="/admin-auth/" class="hidden space-y-4 text-left">
            {% csrf_token %}
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Username</label>
                <input type="text" name="username" class="w-full bg-slate-50 p-3 rounded-lg border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500" required>
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Password</label>
                <input type="password" name="password" class="w-full bg-slate-50 p-3 rounded-lg border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500" required>
            </div>
            <button type="submit" class="w-full bg-slate-900 text-white font-bold py-3 mt-2 rounded-lg hover:bg-slate-800 transition shadow-md">
                Login as Admin
            </button>
        </form>

        <!-- Toggle Button -->
        <button id="toggle-btn" onclick="toggleAdmin()" class="mt-8 text-sm text-blue-600 font-bold hover:underline transition">
            Administrator Login
        </button>
    </div>
</body>
</html>
